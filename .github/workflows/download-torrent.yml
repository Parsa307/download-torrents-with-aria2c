name: Download Torrent

on:
  workflow_dispatch:
    inputs:
      MAGNET:
        description: 'MAGNET'
        required: true
      ARCHIVE_NAME:
        description: 'ARCHIVE_NAME'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Download Torrent
        run: aria2c --seed-time=0 "${{ github.event.inputs.MAGNET }}"

      - name: Zip Downloaded Torrent
        run: zip -r "${{ github.event.inputs.ARCHIVE_NAME }}.zip" *

      - name: Create Release on GitHub
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: "${{ github.event.inputs.ARCHIVE_NAME }}.zip"
